server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Taille max des uploads (images jusqu'à 20 Mo)
    client_max_body_size 20m;

    # Proxy vers le backend FastAPI
    # ^~ : priorité absolue sur les locations regex — évite que la règle
    # de cache des assets intercepte les images de /api/media/files/
    location ^~ /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pas de buffering pour les uploads multipart
        proxy_request_buffering off;
    }

    # SPA — toutes les routes renvoient index.html
    # index.html jamais mis en cache — garantit que le navigateur charge
    # toujours le dernier bundle JS après un déploiement
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Cache des assets statiques du frontend (JS, CSS, fonts, icônes)
    location ~* \.(js|css|woff2?|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Type MIME explicite pour SVG
        types {
            image/svg+xml svg;
        }
    }
}
