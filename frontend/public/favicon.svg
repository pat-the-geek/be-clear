<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fond blanc arrondi -->
  <rect width="100" height="100" rx="20" fill="#FFFFFF"/>
  <rect width="100" height="100" rx="20" fill="#F9FAFB" opacity="0.6"/>

  <!-- ── TORG — Bleu (haut gauche) ── -->
  <!-- bloom aquarelle -->
  <path d="M 8,26 C 8,20 11,14 18,13 C 26,12 35,13 42,16 C 46,18 49,21 48,27 C 47,32 43,36 36,37 C 27,38 15,37 10,32 C 8,29 8,28 8,26 Z"
        fill="#93C5FD" opacity="0.45"/>
  <!-- trait principal : pointe à gauche, plein à droite -->
  <path d="
    M 10,26
    C 10,23 12,19 16,17
    C 21,15 29,15 37,17
    C 41,18 45,21 45,26
    C 45,30 43,33 39,34
    C 33,35 23,34 16,32
    C 12,30 10,28 10,26 Z"
        fill="#3B82F6" opacity="0.93"/>
  <!-- reflet intérieur -->
  <path d="M 14,21 C 19,19 28,19 36,21 C 39,22 41,24 40,25 C 36,23 27,22 18,23 C 15,24 13,23 14,21 Z"
        fill="#FFFFFF" opacity="0.18"/>

  <!-- ── TENV — Orange (haut droite) ── -->
  <!-- bloom -->
  <path d="M 55,26 C 55,20 58,14 65,13 C 73,12 83,13 89,16 C 93,18 95,22 94,27 C 93,32 89,36 82,37 C 73,38 62,37 57,32 C 55,29 55,28 55,26 Z"
        fill="#FDBA74" opacity="0.45"/>
  <!-- trait principal -->
  <path d="
    M 57,26
    C 57,23 59,19 63,17
    C 68,15 76,15 84,17
    C 88,18 91,21 91,26
    C 91,30 89,33 85,34
    C 79,35 69,34 63,32
    C 59,30 57,28 57,26 Z"
        fill="#F97316" opacity="0.93"/>
  <!-- reflet -->
  <path d="M 62,21 C 67,19 76,19 83,21 C 86,22 88,24 87,25 C 83,23 74,22 66,23 C 62,24 60,23 62,21 Z"
        fill="#FFFFFF" opacity="0.18"/>

  <!-- ── TENG — Ambre (bas gauche) ── -->
  <!-- bloom -->
  <path d="M 8,74 C 8,68 11,62 18,61 C 26,60 35,61 42,64 C 46,66 49,70 48,75 C 47,80 43,84 36,85 C 27,86 15,85 10,80 C 8,77 8,76 8,74 Z"
        fill="#FDE68A" opacity="0.45"/>
  <!-- trait principal -->
  <path d="
    M 10,74
    C 10,71 12,67 16,65
    C 21,63 29,63 37,65
    C 41,66 45,69 45,74
    C 45,78 43,81 39,82
    C 33,83 23,82 16,80
    C 12,78 10,76 10,74 Z"
        fill="#F59E0B" opacity="0.93"/>
  <!-- reflet -->
  <path d="M 14,69 C 19,67 28,67 36,69 C 39,70 41,72 40,73 C 36,71 27,70 18,71 C 15,72 13,71 14,69 Z"
        fill="#FFFFFF" opacity="0.18"/>

  <!-- ── TEVENT — Violet (bas droite) ── -->
  <!-- bloom -->
  <path d="M 55,74 C 55,68 58,62 65,61 C 73,60 83,61 89,64 C 93,66 95,70 94,75 C 93,80 89,84 82,85 C 73,86 62,85 57,80 C 55,77 55,76 55,74 Z"
        fill="#C4B5FD" opacity="0.45"/>
  <!-- trait principal -->
  <path d="
    M 57,74
    C 57,71 59,67 63,65
    C 68,63 76,63 84,65
    C 88,66 91,69 91,74
    C 91,78 89,81 85,82
    C 79,83 69,82 63,80
    C 59,78 57,76 57,74 Z"
        fill="#8B5CF6" opacity="0.93"/>
  <!-- reflet -->
  <path d="M 62,69 C 67,67 76,67 83,69 C 86,70 88,72 87,73 C 83,71 74,70 66,71 C 62,72 60,71 62,69 Z"
        fill="#FFFFFF" opacity="0.18"/>
</svg>
