services:

  # ─────────────────────────────────────────────
  # FRONTEND — React 19 + Vite + TypeScript
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beclear_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - beclear_net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # BACKEND — FastAPI (Python)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beclear_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MEILISEARCH_URL=http://search:7700
      - MEILISEARCH_KEY=${MEILISEARCH_MASTER_KEY}
      - REDIS_URL=redis://cache:6379/0
      - OLLAMA_URL=${OLLAMA_URL}
      - SECRET_KEY=${SECRET_KEY}
      - OBSIDIAN_VAULT_PATH=/vault
      - MEDIA_PATH=/media
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8000}
      # Variables pour l'entrypoint (attente PostgreSQL)
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=${POSTGRES_USER}
    volumes:
      - vol_media:/media
      - ${OBSIDIAN_VAULT_PATH_HOST:-/tmp/obsidian}:/vault
    depends_on:
      db:
        condition: service_healthy
      search:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - beclear_net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # BASE DE DONNÉES — PostgreSQL + pgvector
  # ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: beclear_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - vol_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beclear_net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # RECHERCHE FULL-TEXT — Meilisearch
  # ─────────────────────────────────────────────
  search:
    image: getmeili/meilisearch:v1.42.1
    container_name: beclear_search
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
      - MEILI_ENV=production
    volumes:
      - vol_meilisearch:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beclear_net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # CACHE — Redis
  # ─────────────────────────────────────────────
  cache:
    image: redis:8.4-alpine
    container_name: beclear_cache
    ports:
      - "6379:6379"
    volumes:
      - vol_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beclear_net
    restart: unless-stopped

# ─────────────────────────────────────────────
# VOLUMES PERSISTANTS
# ─────────────────────────────────────────────
volumes:
  vol_postgres:
    name: beclear_vol_postgres
  vol_meilisearch:
    name: beclear_vol_meilisearch
  vol_redis:
    name: beclear_vol_redis
  vol_media:
    name: beclear_vol_media

# ─────────────────────────────────────────────
# RÉSEAUX
# Réseau interne be.CLEAR + réseau Ollama partagé
# ─────────────────────────────────────────────
networks:
  beclear_net:
    name: beclear_net
    driver: bridge
