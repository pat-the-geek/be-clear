name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Backend : lint + tests ───────────────────────────────────
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Tests (pytest)
        run: pytest tests/ -q --tb=short
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: ci-secret-key-not-for-production
          MEILISEARCH_URL: http://localhost:7700
          MEILISEARCH_KEY: ci-key
          REDIS_URL: redis://localhost:6379/0
          OLLAMA_URL: http://localhost:11434
          MEDIA_PATH: /tmp/beclear-media
          OBSIDIAN_VAULT_PATH: /tmp/obsidian

  # ─── Frontend : lint + build ──────────────────────────────────
  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─── Docker : build des images ────────────────────────────────
  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t beclear-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t beclear-frontend:ci ./frontend
